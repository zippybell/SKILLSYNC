<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="h-screen bg-gradient-to-br from-blue-600 to-indigo-800 flex justify-center items-center">

    <div class="bg-white p-8 rounded-xl shadow-lg w-80">
        <h2 class="text-2xl font-bold text-center text-blue-600 mb-5">Login</h2>

        <form action="login.php" method="POST">
            <input type="email" name="email" placeholder="Email"
                class="w-full p-2 mb-3 border rounded-lg" required>

            <input type="password" name="password" placeholder="Password"
                class="w-full p-2 mb-3 border rounded-lg" required>

            <label class="flex items-center text-sm mb-3">
                <input type="checkbox" name="remember" class="mr-2">
                Remember me
            </label>

            <button type="submit"
                class="w-full bg-blue-600 text-white p-2 rounded-lg">
                Login
            </button>
        </form>
    </div>

</body>
</html>
